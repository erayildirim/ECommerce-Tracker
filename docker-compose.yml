version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: ecommerce_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ecommerce_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce_user
      DB_PASSWORD: secure_password_here
      DB_NAME: ecommerce_tracker
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "False"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  # Optional: Add Redis for caching/queue
  # redis:
  #   image: redis:7-alpine
  #   container_name: ecommerce_redis
  #   ports:
  #     - "6379:6379"

  # Optional: Add Celery for async tasks
  # celery:
  #   build: .
  #   container_name: ecommerce_celery
  #   environment:
  #     - DB_HOST=postgres
  #     - CELERY_BROKER_URL=redis://redis:6379
  #   depends_on:
  #     - postgres
  #     - redis
  #   command: celery -A tasks worker --loglevel=info

volumes:
  postgres_data:
